<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Soccer Match Outcome Predictor</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 650px;
            background-color: #1e293b;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        h1 {
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
            font-size: 28px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #cbd5e1;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #0ea5e9;
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0284c7;
        }
        button:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }
        .status-loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            color: #38bdf8;
            font-weight: 500;
            font-size: 14px;
        }
        .output-display {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background-color: #0f172a;
            border-radius: 8px;
            border-left: 4px solid #38bdf8;
            line-height: 1.6;
            font-size: 15px;
        }
        .output-display h3 {
            margin-top: 0;
            color: #38bdf8;
        }
        .output-display ul {
            padding-left: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>⚽ DeepMatch AI</h1>
    <div class="subtitle">Predictive Football Intelligence Modeling System</div>
    
    <div class="input-group">
        <label for="homeTeamInput">Home Club Name</label>
        <input type="text" id="homeTeamInput" placeholder="e.g., Real Madrid">
    </div>
    
    <div class="input-group">
        <label for="awayTeamInput">Away Club Name</label>
        <input type="text" id="awayTeamInput" placeholder="e.g., Barcelona">
    </div>
    
    <button id="executionBtn" onclick="requestPrediction()">Generate Analytics Forecast</button>
    
    <div id="statusLoader" class="status-loader">Aggregating 20 years of data parameters & executing AI analysis...</div>
    <div id="outputDisplay" class="output-display"></div>
</div>

<script>
    // CRITICAL DEPLOYMENT DIRECTIVE:
    // While running locally, maintain "http://127.0.0.1:8000/api/predict".
    // When you deploy your Python server code live to a cloud environment (Render, Railway, etc.), 
    // update this variable string with your live backend API endpoint URL.
    const TARGET_API_URL = "http://127.0.0.1:8000/api/predict";

    async function requestPrediction() {
        const homeTeam = document.getElementById('homeTeamInput').value.trim();
        const awayTeam = document.getElementById('awayTeamInput').value.trim();
        const outputDisplay = document.getElementById('outputDisplay');
        const loader = document.getElementById('statusLoader');
        const button = document.getElementById('executionBtn');

        if (!homeTeam || !awayTeam) {
            alert("Error: Both home and away team parameters must be populated.");
            return;
        }

        // Adjust layout components for data processing state
        outputDisplay.style.display = "none";
        loader.style.display = "block";
        button.disabled = true;

        try {
            const serverResponse = await fetch(TARGET_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    home_team: homeTeam,
                    away_team: awayTeam
                })
            });

            if (!serverResponse.ok) {
                throw new Error(`Networking error channel returned status code: ${serverResponse.status}`);
            }

            const dataResult = await serverResponse.json();

            if (dataResult.status === "success") {
                // Convert response markdown content structures cleanly to inner text formatting
                outputDisplay.innerText = dataResult.analysis_result;
                outputDisplay.style.display = "block";
            } else {
                outputDisplay.innerText = "Processing Error: Cloud analytical module failed to handle input parameters.";
                outputDisplay.style.display = "block";
            }

        } catch (connectionError) {
            outputDisplay.innerText = `System Connectivity Alert: Failed to establish contact with the backend analytics engine.\n\nVerify that main.py is running locally at port 8000, or check your live hosted cloud instance.\n\nDetails: ${connectionError.message}`;
            outputDisplay.style.display = "block";
        } finally {
            loader.style.display = "none";
            button.disabled = false;
        }
    }
</script>

</body>
</html>
